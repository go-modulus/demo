extend type Mutation {
    emailSignUp(input: EmailSignUpInput!, userInfo: UserInfo!): TokenPair!
    emailSignIn(input: EmailSignInInput!): TokenPair!
    requestResetPassword(email: String!): Void!
    confirmResetPassword(input: ConfirmResetPasswordInput!): Void!

    changePassword(input: ChangePasswordInput!): Void!
}

input EmailSignUpInput @goModel(model: "github.com/go-modulus/auth/providers/email/graphql.EmailSignUpInput") {
    email: String!
    password: String!
    captcha: CaptchaToken
}

input EmailSignInInput @goModel(model: "github.com/go-modulus/auth/providers/email/graphql.EmailSignInInput") {
    email: String!
    password: String!
    captcha: CaptchaToken
}

input ConfirmResetPasswordInput @goModel(model: "github.com/go-modulus/auth/providers/email/action.ConfirmResetPasswordInput") {
    token: String!
    password: String!
}

input ChangePasswordInput @goModel(model: "github.com/go-modulus/auth/providers/email/action.ChangePasswordInput") {
    oldPassword: String!
    newPassword: String!
}
